<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fixture Mundial 2026 - Eliminatorias</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --brand-blue: #111827;
            --brand-yellow: #fcd34d;
            --text-main: #f9fafb;
            --bg-body: #030712;
            --header-height: 64px;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            overflow: hidden;
            touch-action: manipulation;
            margin: 0; padding: 0;
            height: 100dvh;
        }

        /* --- HEADER --- */
        header {
            position: fixed; top: 0; left: 0; right: 0; height: var(--header-height);
            background-color: #0f172a; color: white; z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: space-between; padding: 0 16px;
            border-bottom: 1px solid #1e293b;
        }
        .btn-reset {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15);
            padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s;
            color: #d1d5db;
        }
        .btn-reset:hover {
            background: rgba(255,255,255,0.1);
            color: white;
            border-color: rgba(255,255,255,0.3);
        }

        /* --- CONTENEDORES --- */
        .main-container {
            position: absolute; top: var(--header-height); bottom: 0; left: 0; right: 0;
            background: var(--bg-body);
        }

        /* --- BRACKET --- */
        #bracket-scroller {
            width: 100%; height: 100%; overflow: auto; display: flex; align-items: flex-start;
            padding: 24px 16px; background: #030712;
            -webkit-overflow-scrolling: touch;
        }
        .bracket-wrapper { display: flex; align-items: stretch; gap: 28px; width: max-content; min-height: 100%; }
        .round-col { 
            display: flex; 
            flex-direction: column; 
            min-width: 104px; 
            min-height: 100%;
            transition: all 0.3s ease-in-out;
        }
        
        .match-node {
            background: #1e293b; border: 1px solid #334155; border-radius: 8px; 
            padding: 3px; width: 104px; position: relative;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column; gap: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .match-node:hover {
            border-color: #4b5563;
            transform: translateY(-1px);
        }
        .match-id-label {
            position: absolute; top: -16px; left: 0; right: 0; 
            text-align: center; font-size: 8px; color: #64748b; font-weight: bold;
            letter-spacing: 0.05em;
        }
        
        .team-slot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 6px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            background: #0f172a;
        }
        .team-slot:hover {
            background: #1e293b;
        }
        .team-slot.winner {
            background: rgba(16, 185, 129, 0.18);
            box-shadow: inset 0 0 0 1px rgba(16, 185, 129, 0.4);
        }
        .team-slot.winner span {
            color: #34d399 !important;
        }
        .team-slot.loser {
            opacity: 0.35;
        }
        .team-flag-sm {
            width: 20px;
            height: 14px;
            object-fit: cover;
            border-radius: 2px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* MODAL */
        #champion-modal { background: rgba(3, 7, 18, 0.9); z-index: 200; backdrop-filter: blur(8px); }
        .confetti { position: absolute; width: 10px; height: 10px; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); } }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 class="text-sm font-black tracking-tight">MUNDIAL <span style="color: var(--brand-yellow);">2026</span></h1>
            <span id="step-indicator" class="text-[10px] opacity-90 font-medium tracking-wide text-green-400">ELIMINATORIAS</span>
        </div>
        <button onclick="confirmReset()" class="btn-reset">Reiniciar Llave</button>
    </header>

    <div id="view-bracket" class="main-container p-0 h-[calc(100dvh-64px)]">
        <div id="bracket-scroller">
            <div id="bracket-canvas" class="bracket-wrapper"></div>
        </div>
    </div>

    <div id="champion-modal" class="fixed inset-0 hidden flex-col items-center justify-center p-6 text-center">
        <div id="confetti-layer" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
        <div class="bg-gray-900 p-8 rounded-3xl shadow-2xl max-w-xs w-full relative z-10 border border-gray-800">
            <div class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-4">¡Nuevo Campeón!</div>
            <div class="relative w-32 h-20 mx-auto mb-4 shadow-md rotate-1">
                <img id="champ-flag" src="" class="w-full h-full object-cover rounded-lg shadow">
            </div>
            <h2 id="champ-name" class="text-3xl font-black text-yellow-400 mb-2">PAÍS</h2>
            <button onclick="location.reload()" class="w-full py-3 bg-gray-800 hover:bg-gray-700 text-gray-200 font-bold rounded-xl transition mt-4">Jugar de nuevo</button>
        </div>
    </div>

    <script>
        let matches = {};

        function init() {
            generateBracket();
        }

        function confirmReset() { 
            if (confirm("¿Reiniciar la simulación?")) {
                location.reload(); 
            }
        }

        function generateBracket() {
            /* PARTIDOS INICIALES (ROUND OF 32) SEGÚN LA IMAGEN */
            const matchesData = [
                // --- CAMINO IZQUIERDO (LEFT SIDE) ---
                { id: 74, p1: { code: "ALE" }, p2: { code: "PAR" }, next: 89 },
                { id: 77, p1: { code: "FRA" }, p2: { code: "SUE" }, next: 89 },
                { id: 73, p1: { code: "SUD" }, p2: { code: "CAN" }, next: 90 },
                { id: 75, p1: { code: "PBJ" }, p2: { code: "MAR" }, next: 90 },
                
                { id: 83, p1: { code: "POR" }, p2: { code: "CRO" }, next: 93 },
                { id: 84, p1: { code: "ESP" }, p2: { code: "AUT" }, next: 93 },
                { id: 81, p1: { code: "USA" }, p2: { code: "BYH" }, next: 94 },
                { id: 82, p1: { code: "BEL" }, p2: { code: "SEN" }, next: 94 },

                // --- CAMINO DERECHO (RIGHT SIDE) ---
                { id: 76, p1: { code: "BRA" }, p2: { code: "JAP" }, next: 91 },
                { id: 78, p1: { code: "CDM" }, p2: { code: "NOR" }, next: 91 },
                { id: 79, p1: { code: "MEX" }, p2: { code: "ECU" }, next: 92 },
                { id: 80, p1: { code: "ING" }, p2: { code: "RDC" }, next: 92 },
                
                { id: 86, p1: { code: "ARG" }, p2: { code: "CBV" }, next: 95 },
                { id: 88, p1: { code: "AUS" }, p2: { code: "EGI" }, next: 95 },
                { id: 85, p1: { code: "SUI" }, p2: { code: "AGL" }, next: 96 },
                { id: 87, p1: { code: "COL" }, p2: { code: "GHA" }, next: 96 }
            ];

            matchesData.forEach(m => {
                matches[m.id] = { ...m, winner: null };
            });
            
            // Generar siguientes rondas (R16, QF, SF, F) vacías
            const mapNext = (c, n) => {
                matches[c] = { id: c, p1: null, p2: null, winner: null, next: n };
            };
            
            // Octavos de final (Round of 16)
            mapNext(89, 97); mapNext(90, 97);
            mapNext(93, 98); mapNext(94, 98);
            mapNext(91, 99); mapNext(92, 99);
            mapNext(95, 100); mapNext(96, 100);

            // Cuartos de final
            mapNext(97, 101); mapNext(98, 101);
            mapNext(99, 102); mapNext(100, 102);

            // Semifinales
            mapNext(101, 104); mapNext(102, 104);

            // Final
            matches[104] = { id: 104, p1: null, p2: null, winner: null, next: null };

            renderVisualBracket();
        }

        function renderVisualBracket() {
            const scroller = document.getElementById('bracket-scroller');
            const scrollX = scroller.scrollLeft; 
            const scrollY = scroller.scrollTop;
            const canvas = document.getElementById('bracket-canvas'); 
            canvas.innerHTML = '';
            
            // Estructura unilateral de izquierda a derecha
            const cols = [
                { id: "R32", round: "R32", title: "Ronda de 32", ids: [74, 77, 73, 75, 83, 84, 81, 82, 76, 78, 79, 80, 86, 88, 85, 87] },
                { id: "R16", round: "R16", title: "Octavos", ids: [89, 90, 93, 94, 91, 92, 95, 96] },
                { id: "QF",  round: "QF",  title: "Cuartos", ids: [97, 98, 99, 100] },
                { id: "SF",  round: "SF",  title: "Semis", ids: [101, 102] },
                { id: "F",   round: "F",   title: "Final", ids: [104] }
            ];

            // Filtrar columnas: R32 siempre es visible. R16, QF, SF, F son visibles si tienen al menos un equipo definido.
            const visibleCols = cols.filter((col, idx) => {
                if (idx === 0) return true;
                return col.ids.some(id => matches[id].p1 || matches[id].p2);
            });

            visibleCols.forEach(col => {
                const colDiv = document.createElement('div'); 
                colDiv.className = "round-col";
                
                // Cabecera de la columna
                colDiv.innerHTML = `
                    <div class="text-[9px] font-black text-slate-500 tracking-wider text-center mb-4 uppercase shrink-0 border-b border-slate-800 pb-2">
                        ${col.title}
                    </div>
                `;

                // Contenedor de partidos que distribuye verticalmente usando flex-grow
                const matchesCtn = document.createElement('div');
                matchesCtn.className = "flex flex-col justify-around grow gap-4 py-2";

                col.ids.forEach(id => {
                    const m = matches[id];
                    const div = document.createElement('div'); 
                    div.className = "match-node";
                    div.innerHTML = `<div class="match-id-label">M${id}</div>`;
                    
                    const p1 = m.p1 ? m.p1.code : "?"; 
                    const p2 = m.p2 ? m.p2.code : "?";
                    
                    const p1Flag = translateFlag(p1);
                    const p2Flag = translateFlag(p2);
                    
                    const p1FlagImg = p1Flag ? `<img src="https://flagcdn.com/w40/${p1Flag}.png" class="team-flag-sm">` : `<div class="w-5 h-3.5 bg-gray-800 rounded-sm border border-slate-700"></div>`;
                    const p2FlagImg = p2Flag ? `<img src="https://flagcdn.com/w40/${p2Flag}.png" class="team-flag-sm">` : `<div class="w-5 h-3.5 bg-gray-800 rounded-sm border border-slate-700"></div>`;
                    
                    const p1WinnerClass = m.winner && m.winner.code === p1 ? 'winner' : (m.winner ? 'loser' : '');
                    const p2WinnerClass = m.winner && m.winner.code === p2 ? 'winner' : (m.winner ? 'loser' : '');
                    
                    div.innerHTML += `
                        <div onclick="pickWinner(${id}, 'p1')" class="team-slot ${p1WinnerClass}">
                            <span class="text-[10px] font-black text-gray-300 tracking-wider">${p1}</span>
                            ${p1FlagImg}
                        </div>
                        <div class="h-[1px] bg-slate-700 w-full"></div>
                        <div onclick="pickWinner(${id}, 'p2')" class="team-slot ${p2WinnerClass}">
                            <span class="text-[10px] font-black text-gray-300 tracking-wider">${p2}</span>
                            ${p2FlagImg}
                        </div>
                    `;
                    matchesCtn.appendChild(div);
                });
                colDiv.appendChild(matchesCtn);
                canvas.appendChild(colDiv);
            });

            // Columna de campeón si la final tiene un ganador definido
            const finalMatch = matches[104];
            if (finalMatch && finalMatch.winner) {
                const champCol = document.createElement('div');
                champCol.className = "round-col items-center";
                
                champCol.innerHTML = `
                    <div class="text-[9px] font-black text-yellow-500 tracking-wider text-center mb-4 uppercase shrink-0 border-b border-slate-800 pb-2 w-full">
                        Campeón
                    </div>
                    <div class="flex flex-col items-center justify-center grow py-2">
                        <div class="bg-gray-900 border border-yellow-500/40 rounded-xl p-4 flex flex-col items-center justify-center shadow-[0_0_15px_rgba(245,158,11,0.2)] w-24 text-center animate-bounce">
                            <img src="https://flagcdn.com/w80/${translateFlag(finalMatch.winner.code)}.png" class="w-12 h-8 rounded object-cover shadow-sm border border-slate-700 mb-2">
                            <span class="text-xs font-black text-yellow-400 tracking-wide">${finalMatch.winner.code}</span>
                        </div>
                    </div>
                `;
                canvas.appendChild(champCol);
            }
            
            scroller.scrollLeft = scrollX; 
            scroller.scrollTop = scrollY;
        }

        function pickWinner(mid, slot) {
            const m = matches[mid];
            const winner = slot === 'p1' ? m.p1 : m.p2;
            if (!winner || !winner.code || winner.code === "?") return;
            
            if (m.winner && m.winner.code !== winner.code && m.next) {
                resetTree(m.next, mid);
            }
            m.winner = winner;
            
            let newColumnOpened = false;
            if (m.next) {
                const nextM = matches[m.next];
                const isTopSource = [74, 73, 83, 81, 76, 79, 86, 85, 89, 93, 91, 95, 97, 99, 101].includes(mid);
                
                const wasNextEmpty = !nextM.p1 && !nextM.p2;
                
                if (isTopSource) {
                    nextM.p1 = { code: winner.code, fromId: mid };
                } else {
                    nextM.p2 = { code: winner.code, fromId: mid };
                }
                nextM.winner = null;
                
                if (wasNextEmpty) {
                    newColumnOpened = true;
                }
            } else {
                showChampion(winner);
                newColumnOpened = true;
            }
            
            renderVisualBracket();
            
            // Desplazar automáticamente a la derecha si se abrió una nueva columna
            if (newColumnOpened) {
                setTimeout(() => {
                    const scroller = document.getElementById('bracket-scroller');
                    scroller.scrollTo({
                        left: scroller.scrollWidth,
                        behavior: 'smooth'
                    });
                }, 100);
            }
        }

        function resetTree(mid, fromId) {
            if (!matches[mid]) return;
            const m = matches[mid];
            
            if (m.p1 && m.p1.fromId === fromId) {
                m.p1 = null;
                m.winner = null;
            } else if (m.p2 && m.p2.fromId === fromId) {
                m.p2 = null;
                m.winner = null;
            }
            
            if (m.next && !m.winner) {
                resetTree(m.next, mid);
            }
        }

        function showChampion(team) {
            const modal = document.getElementById('champion-modal');
            const flagCode = translateFlag(team.code);
            document.getElementById('champ-flag').src = `https://flagcdn.com/w320/${flagCode}.png`;
            document.getElementById('champ-name').innerText = team.code;
            modal.classList.remove('hidden'); 
            modal.classList.add('flex');
            
            const layer = document.getElementById('confetti-layer'); 
            layer.innerHTML = '';
            const colors = ['#fcd34d', '#10b981', '#ffffff', '#ef4444'];
            for (let i = 0; i < 80; i++) {
                const el = document.createElement('div'); 
                el.className = 'confetti';
                el.style.left = Math.random() * 100 + '%'; 
                el.style.top = -10 + 'px';
                el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                el.style.animationDuration = (Math.random() * 3 + 2) + 's';
                layer.appendChild(el);
            }
        }

        function translateFlag(code) {
            const map = {
                "ALE": "de", "PAR": "py", "FRA": "fr", "SUE": "se",
                "SUD": "za", "CAN": "ca", "PBJ": "nl", "MAR": "ma",
                "POR": "pt", "CRO": "hr", "ESP": "es", "AUT": "at",
                "USA": "us", "BYH": "ba", "BEL": "be", "SEN": "sn",
                "BRA": "br", "JAP": "jp", "CDM": "ci", "NOR": "no",
                "MEX": "mx", "ECU": "ec", "ING": "gb-eng", "RDC": "cd",
                "ARG": "ar", "CBV": "cv", "AUS": "au", "EGI": "eg",
                "SUI": "ch", "AGL": "dz", "COL": "co", "GHA": "gh"
            };
            return map[code] || "";
        }

        init();
    </script>
</body>
</html>
